# Snippet para nginx — cerrajeriaflash.pe
# Agregar DENTRO del bloque server { ... } de HTTPS, ANTES de location /

# robots.txt (Next.js lo sirve en :3000 pero nginx lo intercepta)
location = /robots.txt {
    alias /var/www/cerrajeria/public/robots.txt;
    default_type text/plain;
    access_log off;
}

# Opcional: favicon directo desde public/
location = /logoico.png {
    alias /var/www/cerrajeria/public/logoico.png;
    default_type image/png;
    access_log off;
    expires 30d;
}

# Después de probar:
#   sudo nginx -t && sudo systemctl reload nginx
#   curl -s https://cerrajeriaflash.pe/robots.txt
#   curl -I https://cerrajeriaflash.pe/logoico.png
